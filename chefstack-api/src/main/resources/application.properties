# ===== Configuracion comun a todos los entornos =====
spring.application.name=chefstack-api

# Perfil activo: 'dev' en local, 'prod' en el despliegue (se sobreescribe por variable de entorno)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Puerto (Railway inyecta PORT en produccion)
server.port=${PORT:8080}

# Carga opcional de secretos locales que NO van al repositorio (Spoonacular, etc.)
spring.config.import=optional:file:./config/secrets.properties

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ===== Swagger / OpenAPI =====
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ===== Firebase (projectId es publico, no es secreto) =====
firebase.project-id=${FIREBASE_PROJECT_ID:chefstack-9d766}

# ===== API externa de nutricion (Spoonacular) =====
spoonacular.base-url=${SPOONACULAR_BASE_URL:https://api.spoonacular.com}
spoonacular.api-key=${SPOONACULAR_API_KEY:}

# ===== CORS: origenes del frontend autorizados (separados por coma) =====
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ===== Datos demo iniciales (se siembran solo si la BD esta vacia) =====
chefstack.seed=${CHEFSTACK_SEED:true}

# ===== Subida de imagenes =====
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
