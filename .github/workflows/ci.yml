name: CI

# Integracion continua: compila el backend y el frontend en cada push y pull request.
# Garantiza que el codigo siempre construye antes de desplegar.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Compilar y empaquetar
        working-directory: chefstack-api
        run: mvn -B -DskipTests package

  frontend:
    name: Frontend (Vue 3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: chefstack-web/package-lock.json
      - name: Instalar dependencias
        working-directory: chefstack-web
        run: npm ci
      - name: Construir
        working-directory: chefstack-web
        run: npm run build
